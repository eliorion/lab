apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "26.x.x" # Check for latest version
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    # Run Traefik on every Worker Node
    deployment:
      kind: DaemonSet
    
    # Do not create a LoadBalancer Service (it would stay 'Pending' forever)
    service:
      enabled: true
      type: ClusterIP

    # Bind directly to the Node's ports (80/443)
    ports:
      web:
        redirectTo: websecure
        hostPort: 80
      websecure:
        hostPort: 443
    
    # Talos specific: ensure security context allows binding to privileged ports
    securityContext:
      capabilities:
        drop: [ALL]
        add: [NET_BIND_SERVICE]
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532